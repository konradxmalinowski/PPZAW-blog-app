{% extends "base.html" %}

{% block title %}Weryfikacja 2FA — devlog{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="terminal-box auth-box">
    <div class="terminal-box-header">Weryfikacja dwuetapowa</div>
    <div class="terminal-box-body">
      <p class="settings-desc" style="margin-bottom:1.5rem;">
        Wprowadź 6-cyfrowy kod z aplikacji uwierzytelniającej.
      </p>
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-field">
          <label for="{{ form.code.id_for_label }}" class="form-label">Kod weryfikacyjny</label>
          {{ form.code }}
          {% if form.code.errors %}
            <div class="form-error">{{ form.code.errors }}</div>
          {% endif %}
        </div>
        <div class="form-submit">
          <button type="submit" class="btn-terminal">Weryfikuj</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
