{% extends "base.html" %}

{% block title %}Zmiana hasła — devlog{% endblock %}

{% block content %}
<div class="profile-container">
  <div class="terminal-box profile-box">
    <div class="terminal-box-header">Zmiana hasła</div>
    <div class="terminal-box-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-field">
          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="form-error">{{ field.errors }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <div class="form-submit">
          <button type="submit" class="btn-terminal">Zmień hasło</button>
          <a href="{% url 'accounts:settings' %}" class="btn-terminal btn-secondary">Anuluj</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
