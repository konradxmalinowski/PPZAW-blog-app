{% extends "base.html" %}

{% block title %}Hasło zmienione — devlog{% endblock %}

{% block content %}
<div class="profile-container">
  <div class="terminal-box profile-box">
    <div class="terminal-box-header">Hasło zostało zmienione</div>
    <div class="terminal-box-body">
      <p class="settings-desc">Twoje hasło zostało pomyślnie zmienione. Możesz się teraz zalogować używając nowego hasła.</p>
      <div class="form-actions" style="margin-top:1.5rem;">
        <a href="{% url 'accounts:login' %}" class="btn-terminal">Zaloguj się</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
