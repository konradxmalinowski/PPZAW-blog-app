# Render Blueprint — deploy devlog with one click.
# https://render.com/docs/blueprint-spec
#
# BEFORE first deploy, add these env vars manually in the Render dashboard
# (they are NOT here because they contain secrets):
#   SUPERUSER_USERNAME, SUPERUSER_EMAIL, SUPERUSER_PASSWORD
#   BREVO_API_KEY         (from brevo.com — free, 300 emails/day, replaces Gmail SMTP)
#   DEFAULT_FROM_EMAIL    (e.g. "DevLog <your@verified-sender.com>")
#   SITE_DEFAULT_OG_IMAGE (optional)

services:
  - type: web
    name: devlog
    env: python
    region: frankfurt
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn devlog.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: devlog.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: devlog-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "False"
      - key: SITE_URL
        value: https://devlog-vzcc.onrender.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"

databases:
  - name: devlog-db
    plan: free
    region: frankfurt
